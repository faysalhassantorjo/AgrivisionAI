services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000

    ports:
      - 8000
    volumes:
      - .:/app

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - web